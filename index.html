<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>nani BOOKSTORE </title>
    <link rel="stylesheet" href="nani.css">
    <style>
        body { 
            font-family : "Pool Story", sans-serif;
            color: #171717;
            max-width: 1440px;           
            width: 100%;
            margin: 0 auto;
            background-color: white;  
        }
    </style>
</head>

<body>

<!-- 1) 매장안내 외 1440*54 -->
    <header>        
        <nav class="header_left">Nani Bookstore</nav>
        <nav class="header_right">
            <a href="#" style="color: #21f1a8;">로그인</a>
            <a href="#" style="color: #21f1a8;">회원가입</a>
            <a href="#" style="color: #21f1a8;">장바구니</a>
            <a href="#" style="color: #21f1a8;">주문/배송</a>
            <a href="#" style="color: #21f1a8;">고객센터</a>
        </nav>
    </header>
    
<!-- ===> 2) 영풍문고 검색 1440*158 <=== -->
    <div id="Main_banner">
        <div class="Main_banner_logo">
            <img src="이미지/nani_store_logo1.png" alt="로고">
        </div>
        
        <form class="Main_banner_search" action="Main_search.html" method="GET" target="_blank">
            <input type="text" id="searchInput" class="search_input" placeholder="검색어를 입력해주세요." name="keyword">
            <button type="submit" class="search_btn">
                <img src="이미지/search-icon.png" alt="검색">
            </button>            
        </form>
        
        <a class="Main_banner_book" href="#">
            <div class="Main_banner_book_img">
                <img id="main_banner_book_img" src="이미지/book-cover1.jpg" alt="MainBanner">
            </div>
            <div class="Main_banner_info">
                <div class="Main_banner_book_title">
                    <h3 id="Main_banner_title1" class="Main_book_title1">매스커레이드 라이프</h3>
                </div>
                <div class="Main_banner_book_author1">
                    <p id="Main_banner_author1" class="Main_book_author1">
                        히가시노 게이고 미스터리<br>
                        최신작
                    </p>
                </div>
                <div class="Main_banner_arrows">
                    <button type="button" id="Main_banner_prev_btn" class="main_banner_prev_btn">
                        <img src="이미지/오른쪽3.png" alt="이전">
                    </button>
                    <button type="button" id="Main_banner_next_btn" class="main_banner_next_btn">
                        <img src="이미지/왼쪽3.png" alt="다음">
                    </button>
                </div>
            </div>
        </a>
    </div>

<div id="bookList" class="book-list-container"></div>

     
<!-- ===> 3) 베스트 셀러 섹션 1440*423 <===    -->
    <div id="BestSheller_section">
        <!-- <div class="BestSheller_section_button"></div> -->
    <button type="button" id="BestSheller_btn_left" class="BestSheller_left_btn">
        <img src="이미지/오른쪽3.png">
        <span class="BestSheller_slider_left"></span>
    </button>
    <button type="button" id="BestSheller_btn_right" class="BestSheller_right_btn">
        <img src="이미지/왼쪽3.png">
        <span class="BestSheller_slider_right"></span>
    </button>
    
    <div class="BestSheller_slider_container">
        <a class="BestSheller_section_show" href="#">
            <div class="BestSheller_text_box">
                <span class="BestSheller_sub_title">나는 내가 아닌 나</span>
                
                <h2 class="BestSheller_main_title">
                    <span>60여 년 전 어느 청년이 남긴</span> <span>삶과 존재에 대한 치열한 기록.</span> </h2>
                
                <span class="BestSheller_more_btn">more &gt;</span>
            </div>
            <div class="BestSheller_img">
                <img src="이미지/BestSheller1_나는 내가 아닌 나.jpg" alt="나는 내가 아닌 나">
            </div>                
        </a>
    </div>  <div class="BestSheller_page">
        <span>4</span> / <span>4</span>
    </div> 
</div>


   <!-- ===> 4) 신간도서 외 1440*210 <===  -->
    <div id="Book_index">
        <a class="Book_index_section" href="#">
            <img class="Book_index_cover" src="/nb/이미지/오늘의책.png" alt="오늘의책">
            <p class="Book_index_name"></p>
        </a>
        <a class="Book_index_section" href="#">
            <img class="Book_index_cover" src="/nb/이미지/베스트도서.png" alt="베스트도서">
            <p class="Book_index_name"></p>
        </a>
        <a class="Book_index_section" href="#">
            <img class="Book_index_cover" src="/nb/이미지/화제의신간.png" alt="화제의신간">
            <p class="Book_index_name"></p>
        </a>
        <a class="Book_index_section" href="#">
            <img class="Book_index_cover" src="/nb/이미지/급상승도서.png" alt="급상승도서">
            <p class="Book_index_name"></p>
        </a>
        <a class="Book_index_section" href="#">
            <img class="Book_index_cover" src="/nb/이미지/md추천도서.png" alt="MD추천도서">
            <p class="Book_index_name"></p>
        </a>
    </div>
    
    <!-- ===> 5) 오늘의 책 1440*530 <=== -->
    <div id="Today_book">
        <div class="Today_book_header">
            <h2 class="Today_book_title">오늘의책</h2>
            <div class="Today_book_nav">
            <button id="prev-btn" class="nav-btn"><img src="이미지/오른쪽3.png"></button>
            <button id="next-btn" class="nav-btn"><img src="이미지/왼쪽3.png"></button>
            </div>
        </div>
    
        <div class="Today_book_list" id="book-list-container"></div>
    </div>

    

</body>
<script src="Main_banner.js"></script>  
<script src="Bestsheller.js"></script>
<script src="Kakao_shsearch.js"></script>
<script src="Todaybook.js"></script>
</html>
